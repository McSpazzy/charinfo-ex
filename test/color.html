<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ColorIndex Grid</title>
    <style>
      .meta {
        margin: 0 0 16px;
        color: #555;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(10, minmax(56px, 1fr));
        gap: 8px;
        max-width: 760px;
      }

      .swatch {
        aspect-ratio: 1 / 1;
        border-radius: 8px;
        border: 1px solid rgba(0, 0, 0, 0.12);
        display: flex;
        align-items: flex-end;
        justify-content: center;
        padding: 4px;
        font-size: 11px;
        font-weight: 600;
        line-height: 1;
      }
    </style>
  </head>
  <body>
    <div id="grid" class="grid"></div>

    <script type="module">
      import { ColorIndex } from "../lib/esm/ColorIndex.mjs";
      import { ColorOrderMiiStudio, ColorOrderLTD } from "../lib/esm/ColorOrder.mjs";

      const currentColorOrder = ColorOrderLTD;

      function textColorFor(hex) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        const luminance = (0.2126 * r + 0.7152 * g + 0.0722 * b) / 255;
        return luminance < 0.5 ? "#fff" : "#000";
      }

      function main() {
        const grid = document.getElementById("grid");

        try {
          for (const id of currentColorOrder) {
            const entry = ColorIndex[id];
            const hex = entry?.color ?? "#000000";

            const cell = document.createElement("div");
            cell.className = "swatch";
            cell.style.background = hex;
            cell.style.color = textColorFor(hex);
            cell.title = `${id}: ${hex}`;
            cell.textContent = String(id);
            grid.appendChild(cell);
          }
        } catch (e) {}
      }

      main();
    </script>
  </body>
</html>
